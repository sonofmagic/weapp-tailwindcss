packages:
  - packages/*
  - packages-runtime/*
  - apps/*
  - website
  - benchmark/*
  - tools/*
  - e2e
  - examples/*
  - starter/*
  - '!tailwindcss-weapp'
  - '!**/test/**'
  - demo/*
  - demo/web/*

allowBuilds:
  '@dcloudio/hbuilderx-cli': false
  '@parcel/watcher': false
  '@swc/core': false
  '@tarojs/binding': false
  '@tarojs/cli': false
  '@tailwindcss/oxide': true
  '@weapp-tailwindcss/merge': true
  core-js: false
  core-js-pure: false
  esbuild: true
  '@nutui/nutui-react-taro': false
  msgpackr-extract: false
  sharp: true
  taro-hooks: false
  unrs-resolver: false
  vue-demi: false
  workerd: true

pmOnFail: warn
minimumReleaseAge: 0
minimumReleaseAgeExclude:
  - prettier@3.9.3

overrides:
  jiti: 2.7.0
  postcss-calc: link:packages/postcss-calc

