name: Sync Skills

on:
  push:
    branches:
      - main
    paths:
      - 'skills/**'
      - .github/workflows/sync-skills.yml
  workflow_dispatch:
    inputs:
      target_branch:
        description: 目标仓库分支
        required: false
        default: main

concurrency:
  group: sync-skills
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      TARGET_REPO: sonofmagic/skills
      TARGET_BRANCH: ${{ inputs.target_branch || 'main' }}
      TARGET_SKILLS_DIR: skills

    steps:
      - name: Check out source repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Validate source skills directory
        run: |
          set -euo pipefail
          if [[ ! -d skills ]]; then
            echo "Error: source skills directory not found."
            exit 1
          fi
          if [[ -z "$(find skills -mindepth 1 -print -quit)" ]]; then
            echo "Error: source skills directory is empty."
            exit 1
          fi

      - name: Check out target repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.SKILLS_SYNC_TOKEN }}
          path: target
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Sync skills content
        run: |
          set -euo pipefail
          mkdir -p "target/${TARGET_SKILLS_DIR}"
          rsync -a --delete --exclude '.git/' skills/ "target/${TARGET_SKILLS_DIR}/"

      - name: Commit and push changes
        run: |
          set -euo pipefail
          if [[ -z "$(git -C target status --porcelain)" ]]; then
            echo "No changes to sync."
            exit 0
          fi
          git -C target config user.name "github-actions[bot]"
          git -C target config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C target add .
          git -C target commit -m "chore: sync skills from weapp-tailwindcss"
          git -C target push origin "HEAD:${TARGET_BRANCH}"
