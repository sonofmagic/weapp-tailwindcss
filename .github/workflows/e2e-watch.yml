name: E2E Watch

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'packages/weapp-tailwindcss/**'
      - 'e2e/**'
      - 'tools/weapp-tailwindcss-scripts/**'
      - 'demo/**'
      - 'website/docs/tailwindcss/v5-*.mdx'
      - 'scripts/**'
      - '.github/scripts/**'
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/e2e-watch.yml
      - '!website/**'
      - '!**/*.md'
      - '!.changeset/**'
  workflow_dispatch:
    inputs:
      run_pr_quick_gate:
        description: Run the pull request quick gate matrix instead of the nightly matrix
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 18 * * *'

concurrency:
  group: e2e-watch-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-quick-gate:
    name: e2e-watch-pr (${{ matrix.runner_label }}-node${{ matrix['node-version'] || 22 }}-${{ matrix.watch_case }}-${{ matrix.round_profile }})
    if: (github.event_name == 'pull_request' && github.event.pull_request.draft == false) || (github.event_name == 'workflow_dispatch' && inputs.run_pr_quick_gate == true)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            runner_label: macos
            watch_case: uni-app-vite-tailwindcss-v4
            round_profile: default
            watch_save_snapshots: '1'
            watch_web_only: '1'
            timeout_minutes: 60
            watch_timeout_ms: '420000'
            watch_poll_ms: '40'
            watch_command_timeout_ms: '1500000'
          - os: macos-latest
            runner_label: macos
            watch_case: uni-app-vite-tailwindcss-v4
            round_profile: issue33
            watch_save_snapshots: '1'
            timeout_minutes: 60
            watch_timeout_ms: '420000'
            watch_poll_ms: '40'
            watch_max_plugin_process_ms: '9000'
            watch_command_timeout_ms: '1500000'
          - os: macos-latest
            runner_label: macos
            watch_case: demo-core
            round_profile: default
            watch_save_snapshots: '1'
            # 覆盖 2 次 40 分钟 watch attempt，并给安装、构建和报告上传预留时间。
            timeout_minutes: 95
            watch_timeout_ms: '420000'
            watch_poll_ms: '40'
            watch_max_plugin_process_ms: '60000'
            watch_command_timeout_ms: '5100000'
          - os: macos-latest
            runner_label: macos
            watch_case: demo-taro-react
            round_profile: default
            watch_save_snapshots: '1'
            timeout_minutes: 90
            watch_timeout_ms: '420000'
            watch_poll_ms: '40'
            watch_max_plugin_process_ms: '60000'
            watch_command_timeout_ms: '4800000'
          - os: macos-latest
            runner_label: macos
            watch_case: demo-taro-vue3
            round_profile: default
            watch_save_snapshots: '1'
            timeout_minutes: 90
            watch_timeout_ms: '420000'
            watch_poll_ms: '40'
            watch_max_plugin_process_ms: '60000'
            watch_command_timeout_ms: '4800000'
          - os: macos-latest
            runner_label: macos
            watch_case: demo-uni
            round_profile: default
            watch_save_snapshots: '1'
            timeout_minutes: 45
            watch_timeout_ms: '420000'
            watch_poll_ms: '40'
            watch_max_plugin_process_ms: '60000'
            watch_command_timeout_ms: '1800000'
          - os: macos-latest
