name: E2E Watch

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'packages/weapp-tailwindcss/**'
      - 'e2e/watch/**'
      - 'demo/**'
      - 'apps/**'
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/e2e-watch.yml
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

concurrency:
  group: e2e-watch-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-quick-gate:
    name: e2e-watch-pr (${{ matrix.runner_label }}-node22-${{ matrix.watch_case }}-${{ matrix.round_profile }})
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner_label: ubuntu
            watch_case: uni-app-vue3-vite
            round_profile: issue33
            watch_save_snapshots: '1'
            timeout_minutes: 25
            watch_timeout_ms: '180000'
            watch_poll_ms: '200'
            watch_command_timeout_ms: '420000'
          - os: ubuntu-latest
            runner_label: ubuntu
            watch_case: weapp-vite
            round_profile: issue33
            watch_save_snapshots: '1'
            timeout_minutes: 25
            watch_timeout_ms: '180000'
            watch_poll_ms: '200'
            watch_command_timeout_ms: '420000'
          - os: macos-latest
            runner_label: macos
            watch_case: uni-app-vue3-vite
            round_profile: issue33
            watch_save_snapshots: '1'
            timeout_minutes: 35
            watch_timeout_ms: '240000'
            watch_poll_ms: '280'
            watch_command_timeout_ms: '600000'
          - os: macos-latest
            runner_label: macos
            watch_case: weapp-vite
            round_profile: issue33
            watch_save_snapshots: '1'
            timeout_minutes: 35
            watch_timeout_ms: '240000'
            watch_poll_ms: '280'
            watch_command_timeout_ms: '600000'
          - os: windows-latest
            runner_label: windows
            watch_case: uni-app-vue3-vite
            round_profile: issue33
            watch_save_snapshots: '1'
            timeout_minutes: 40
            watch_timeout_ms: '280000'
            watch_poll_ms: '320'
            watch_command_timeout_ms: '720000'
          - os: windows-latest
            runner_label: windows
            watch_case: weapp-vite
            round_profile: issue33
            watch_save_snapshots: '1'
            timeout_minutes: 40
            watch_timeout_ms: '280000'
            watch_poll_ms: '320'
            watch_command_timeout_ms: '720000'
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout_minutes }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build watch suite package dependencies
        run: |
          pnpm --filter "@weapp-tailwindcss/shared" run build
          pnpm --filter "@weapp-tailwindcss/logger" run build
          pnpm --filter "@weapp-tailwindcss/postcss" run build
          pnpm --filter "weapp-style-injector" run build
          pnpm -r --filter "./packages-runtime/*" run build

      - name: Build weapp-tailwindcss package
        run: pnpm --filter weapp-tailwindcss run build

      - name: Prepare benchmark output directory
        shell: bash
        run: |
          rm -f e2e/benchmark/e2e-watch-hmr/*.json
          rm -rf e2e/benchmark/e2e-watch-hmr/snapshots
          rm -rf e2e/benchmark/e2e-watch-hmr/failures
          mkdir -p e2e/benchmark/e2e-watch-hmr/snapshots
          mkdir -p e2e/benchmark/e2e-watch-hmr/failures

      - name: Run e2e watch suite (PR quick gate)
        env:
          E2E_WATCH_CASE: ${{ matrix.watch_case }}
          E2E_WATCH_TIMEOUT_MS: ${{ matrix.watch_timeout_ms }}
          E2E_WATCH_POLL_MS: ${{ matrix.watch_poll_ms }}
          E2E_WATCH_COMMAND_TIMEOUT_MS: ${{ matrix.watch_command_timeout_ms }}
          E2E_WATCH_ROUND_PROFILE: ${{ matrix.round_profile }}
          E2E_WATCH_SAVE_SNAPSHOTS: ${{ matrix.watch_save_snapshots }}
        run: pnpm e2e:watch

      - name: Generate failure diff summary
        if: failure()
        shell: bash
        run: node .github/scripts/e2e-watch-report.cjs diff-summary

      - name: Generate root cause attribution report
        if: failure()
        shell: bash
        env:
          WATCH_CASE: ${{ matrix.watch_case }}
        run: node .github/scripts/e2e-watch-report.cjs root-cause-report

      - name: Publish job summary
        if: always()
        shell: bash
        run: node .github/scripts/e2e-watch-report.cjs job-summary
        env:
          SUMMARY_TITLE: e2e-watch PR quick gate
          WATCH_CASE: ${{ matrix.watch_case }}
          ROUND_PROFILE: ${{ matrix.round_profile }}

      - name: Upload e2e watch reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-watch-hmr-pr-${{ matrix.runner_label }}-${{ matrix.watch_case }}-${{ matrix.round_profile }}-${{ github.run_id }}
          path: e2e/benchmark/e2e-watch-hmr/*.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload e2e watch failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-watch-hmr-pr-failure-${{ matrix.runner_label }}-${{ matrix.watch_case }}-${{ matrix.round_profile }}-${{ github.run_id }}
          path: |
            e2e/benchmark/e2e-watch-hmr/snapshots/**
            e2e/benchmark/e2e-watch-hmr/failures/**
          if-no-files-found: ignore
          retention-days: 14

  nightly-full-regression:
    name: e2e-watch-nightly (${{ matrix.runner_label }}-node22-${{ matrix.watch_case }}-${{ matrix.round_profile }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner_label: ubuntu
            watch_case: all
            round_profile: default
            watch_save_snapshots: '1'
            timeout_minutes: 60
            watch_timeout_ms: '480000'
            watch_poll_ms: '240'
            watch_command_timeout_ms: '1200000'
          - os: macos-latest
            runner_label: macos
            watch_case: all
            round_profile: default
            watch_save_snapshots: '1'
            timeout_minutes: 80
            watch_timeout_ms: '600000'
            watch_poll_ms: '340'
            watch_command_timeout_ms: '1500000'
          - os: windows-latest
            runner_label: windows
            watch_case: all
            round_profile: default
            watch_save_snapshots: '1'
            timeout_minutes: 95
            watch_timeout_ms: '720000'
            watch_poll_ms: '400'
            watch_command_timeout_ms: '1800000'
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout_minutes }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build watch suite package dependencies
        run: |
          pnpm --filter "@weapp-tailwindcss/shared" run build
          pnpm --filter "@weapp-tailwindcss/logger" run build
          pnpm --filter "@weapp-tailwindcss/postcss" run build
          pnpm --filter "weapp-style-injector" run build
          pnpm -r --filter "./packages-runtime/*" run build

      - name: Build weapp-tailwindcss package
        run: pnpm --filter weapp-tailwindcss run build

      - name: Prepare benchmark output directory
        shell: bash
        run: |
          rm -f e2e/benchmark/e2e-watch-hmr/*.json
          rm -rf e2e/benchmark/e2e-watch-hmr/snapshots
          rm -rf e2e/benchmark/e2e-watch-hmr/failures
          mkdir -p e2e/benchmark/e2e-watch-hmr/snapshots
          mkdir -p e2e/benchmark/e2e-watch-hmr/failures

      - name: Run e2e watch suite (nightly/full)
        env:
          E2E_WATCH_CASE: ${{ matrix.watch_case }}
          E2E_WATCH_TIMEOUT_MS: ${{ matrix.watch_timeout_ms }}
          E2E_WATCH_POLL_MS: ${{ matrix.watch_poll_ms }}
          E2E_WATCH_COMMAND_TIMEOUT_MS: ${{ matrix.watch_command_timeout_ms }}
          E2E_WATCH_ROUND_PROFILE: ${{ matrix.round_profile }}
          E2E_WATCH_SAVE_SNAPSHOTS: ${{ matrix.watch_save_snapshots }}
        run: pnpm e2e:watch

      - name: Generate failure diff summary
        if: failure()
        shell: bash
        run: node .github/scripts/e2e-watch-report.cjs diff-summary

      - name: Generate root cause attribution report
        if: failure()
        shell: bash
        env:
          WATCH_CASE: ${{ matrix.watch_case }}
        run: node .github/scripts/e2e-watch-report.cjs root-cause-report

      - name: Publish job summary
        if: always()
        shell: bash
        run: node .github/scripts/e2e-watch-report.cjs job-summary
        env:
          SUMMARY_TITLE: e2e-watch nightly/full regression
          WATCH_CASE: ${{ matrix.watch_case }}
          ROUND_PROFILE: ${{ matrix.round_profile }}

      - name: Upload e2e watch reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-watch-hmr-nightly-${{ matrix.runner_label }}-${{ matrix.watch_case }}-${{ matrix.round_profile }}-${{ github.run_id }}
          path: e2e/benchmark/e2e-watch-hmr/*.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload e2e watch failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-watch-hmr-nightly-failure-${{ matrix.runner_label }}-${{ matrix.watch_case }}-${{ matrix.round_profile }}-${{ github.run_id }}
          path: |
            e2e/benchmark/e2e-watch-hmr/snapshots/**
            e2e/benchmark/e2e-watch-hmr/failures/**
          if-no-files-found: ignore
          retention-days: 14
