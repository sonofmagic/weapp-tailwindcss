            artifact_case: taro-vite-react-tailwindcss-v4-tt
            round_profile: default
            watch_save_snapshots: '1'
            timeout_minutes: 70
            watch_timeout_ms: '600000'
            watch_poll_ms: '40'
            # Windows TT 独立分包 added-class 会触发较重的冷态构建，需要独立处理预算。
