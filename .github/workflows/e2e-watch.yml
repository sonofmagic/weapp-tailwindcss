name: E2E Watch

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'packages/weapp-tailwindcss/**'
      - 'e2e/watch/**'
      - 'demo/**'
      - 'apps/**'
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/e2e-watch.yml
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

concurrency:
  group: e2e-watch-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-watch:
    name: e2e-watch (ubuntu-node22)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build watch suite package dependencies
        run: pnpm --filter @weapp-tailwindcss/postcss run build

      - name: Build weapp-tailwindcss package
        run: pnpm --filter weapp-tailwindcss run build

      - name: Run e2e watch suite
        run: pnpm e2e:watch

      - name: Upload e2e watch reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-watch-hmr-reports-${{ github.run_id }}
          path: e2e/benchmark/e2e-watch-hmr/*.json
          if-no-files-found: ignore
          retention-days: 14
