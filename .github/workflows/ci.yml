name: CI

on:
  # push:
  #   branches: ['main']
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    # Remote Caching enabled - configure TURBO_TOKEN and TURBO_TEAM in repository settings
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security Audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Lint
        run: pnpm lint

      - name: SEO Quality Gate (website)
        run: pnpm --filter @weapp-tailwindcss/website seo:quality:strict

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: CI Status Note
        if: always()
        run: |
          {
            echo "## CI 状态说明"
            echo "- 本工作流负责：lint、website SEO 质量门禁、build、unit/integration tests、coverage 上传。"
            echo "- \`pnpm e2e:watch\` 已拆分到独立工作流：\`E2E Watch\`（.github/workflows/e2e-watch.yml）。"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
