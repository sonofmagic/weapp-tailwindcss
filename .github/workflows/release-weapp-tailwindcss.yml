name: Release weapp-tailwindcss

on:
  push:
    branches:
      - next
  workflow_dispatch:
    inputs:
      prerelease-tag:
        description: changeset prerelease tag
        required: true
        default: next
concurrency: ${{ github.workflow }}-${{ github.ref }}
env:
  HUSKY: 0

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    if: "github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'chore: version packages for next prerelease')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: pnpm i

      - name: Verify changeset prerelease mode
        run: |
          test -f .changeset/pre.json
          node -e 'const pre=require("./.changeset/pre.json"); const expected=process.env.EXPECTED_PRERELEASE_TAG; if (pre.tag !== expected) { throw new Error("Expected changeset prerelease tag " + expected + ", got " + pre.tag) }'
        env:
          EXPECTED_PRERELEASE_TAG: ${{ inputs.prerelease-tag || 'next' }}

      - name: Create release pull request or publish prerelease
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm publish-packages
          title: 'chore: version packages for next prerelease'
          commit: 'chore: version packages for next prerelease'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          npm_config_registry: https://registry.npmjs.org
          NPM_CONFIG_PROVENANCE: true
